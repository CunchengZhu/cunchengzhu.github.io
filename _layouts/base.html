<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  <head>
    {%- include head.html -%}
    <style>
        .image-side {
            float: left; /* or 'left' if you want it on the left */
            margin: 20px 20px 0px 0px; 
             /* Adjust the border size and style to fit your needs */
            border: 5px solid white;
            
            /* Optional styles */
            border-radius: 5%; 
            box-shadow: 0 2px 4px rgba(1, 0, 0,0.2); /* Optional: adds a shadow for a 3D effect */
        }
        .social-media-list img {
          opacity: 0.5;
        }
    </style>

    {% if page.math %}
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}
  </head>


  <body>
    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- Statcounter code for personal page http://cunchengzhu.github.io on Google
    Sites (new) -->
    <script type="text/javascript">
    var sc_project=13214475; 
    var sc_invisible=1; 
    var sc_security="2684caf6"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
    <noscript>
      <div class="statcounter">
        <a title="Web Analytics" href="https://statcounter.com/" target="_blank">
          <img class="statcounter"
          src="https://c.statcounter.com/13214475/0/2684caf6/1/" 
          alt="Web Analytics"
          referrerPolicy="no-referrer-when-downgrade">
        </a>
      </div>
    </noscript>
    <!-- End of Statcounter Code -->

  </body>

</html>
